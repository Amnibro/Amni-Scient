<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1.0">
<title>Amni-Learn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  body { overflow: hidden; margin: 0; padding: 0; touch-action: none; background: #0c0f12; }
  #app { width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; }
  
  /* Top Nav */
  .top-bar { display: flex; justify-content: space-between; padding: 10px 20px; background: rgba(0,0,0,0.8); z-index: 10; border-bottom: 1px solid #333; align-items: center; }
  .back-btn, .fs-btn { background: none; border: 1px solid #4db8ff; color: #4db8ff; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-family: 'JetBrains Mono'; }
  .back-btn:hover, .fs-btn:hover { background: rgba(77,184,255,0.2); }
  .top-controls { display: flex; gap: 10px; align-items: center; }
  .fs-hint { color: #888; font-size: 0.8rem; font-family: 'JetBrains Mono'; display: none; margin-left: 10px; }
  
  /* Views */
  .view { display: none; flex: 1; width: 100%; height: 100%; position: absolute; top: 0; left: 0; padding-top: 80px; box-sizing: border-box; overflow-y: auto; }
  .view.active { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
  
  /* Main Menu */
  #menu-view { background: #0c0f12; color: #fff; justify-content: center; }
  .menu-title { font-size: 2.5rem; color: #4db8ff; margin-bottom: 1rem; text-shadow: 0 0 10px rgba(77,184,255,0.5); text-align: center; }
  
  .diff-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 1rem; }
  .diff-btn { background: #111; border: 1px solid #555; color: #aaa; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-family: 'JetBrains Mono'; font-size: 1rem; transition: 0.2s; }
  .diff-btn.active { background: #4db8ff; color: #000; border-color: #4db8ff; font-weight: bold; }
  
  .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 900px; padding: 20px; width: 100%; box-sizing: border-box; }
  .cat-title { grid-column: 1 / -1; color: #888; font-family: 'JetBrains Mono'; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
  
  .game-btn { background: #1a222a; border: 2px solid #4db8ff; color: #fff; padding: 15px 20px; font-size: 1.2rem; border-radius: 12px; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-family: 'JetBrains Mono'; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .game-btn:hover { transform: scale(1.05); background: #2a3642; box-shadow: 0 0 15px rgba(77,184,255,0.4); }
  .game-btn.tracing { border-color: #ff6b35; } .game-btn.tracing:hover { box-shadow: 0 0 15px rgba(255,107,53,0.4); }
  .game-btn.math { border-color: #4cd137; } .game-btn.math:hover { box-shadow: 0 0 15px rgba(76,209,55,0.4); }
  .game-btn.matching { border-color: #9c88ff; } .game-btn.matching:hover { box-shadow: 0 0 15px rgba(156,136,255,0.4); }
  .game-btn.typing { border-color: #f1c40f; } .game-btn.typing:hover { box-shadow: 0 0 15px rgba(241,196,15,0.4); }
  .game-btn.life { border-color: #e84393; } .game-btn.life:hover { box-shadow: 0 0 15px rgba(232,67,147,0.4); }

  .btn-icon { font-size: 1.5em; line-height: 1; display: block; }
  
  .game-grid.mode-1 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
  .game-grid.mode-1 .game-btn { flex-direction: column; padding: 40px 20px; border-width: 4px; border-radius: 20px; }
  .game-grid.mode-1 .btn-icon { font-size: 6rem; margin-bottom: 15px; }
  .game-grid.mode-1 .btn-text { font-size: 1.8rem; font-family: 'Comic Neue', cursive; font-weight: bold; }
  
  .game-grid.mode-2 { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; }
  .game-grid.mode-2 .game-btn { flex-direction: column; padding: 25px 15px; border-width: 3px; border-radius: 16px; }
  .game-grid.mode-2 .btn-icon { font-size: 4rem; margin-bottom: 10px; }
  .game-grid.mode-2 .btn-text { font-size: 1.5rem; }
  
  /* Game Backgrounds */
  #tracing-view { background: #fdf6e3; }
  #math-view { background: #e0f7fa; justify-content: center; }
  #matching-view { background: #f3e5f5; justify-content: center; }
  #typing-view { background: #ffefd5; justify-content: center; }
  #life-view { background: #e8f8f5; justify-content: center; }
  
  /* Tracing Game */
  #trace-canvas { background: #fff; border: 4px dashed #ccc; border-radius: 20px; cursor: crosshair; touch-action: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: 10px; }
  .tracing-controls { margin-top: 15px; display: flex; gap: 10px; margin-bottom: 20px; }
  .t-btn { padding: 10px 20px; font-size: 1.2rem; border-radius: 8px; border: none; cursor: pointer; font-family: 'Comic Neue', cursive; font-weight: bold; color: white; }
  .t-clear { background: #e74c3c; } .t-next { background: #2ecc71; }
  
  #creative-mode-toggle { font-family: 'Comic Neue', cursive; font-size: 1.2rem; margin-top: 15px; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; background: #9b59b6; color: #fff; box-shadow: 0 4px 0 #8e44ad; transition: transform 0.1s; }
  #creative-mode-toggle:active { transform: translateY(4px); box-shadow: none; }
  
  .draw-tools { display: none; flex-wrap: wrap; justify-content: center; margin-top: 15px; gap: 15px; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 12px; }
  .tool-group { display: flex; gap: 10px; align-items: center; border-right: 2px solid #ccc; padding-right: 15px; }
  .tool-group:last-child { border-right: none; }
  .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: 0.2s; }
  .color-btn.active { border-color: #333; transform: scale(1.15); box-shadow: 0 0 10px rgba(0,0,0,0.2); }
  .brush-btn { font-size: 1.5rem; background: #fff; border: 2px solid #ddd; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
  .brush-btn.active { border-color: #333; background: #f0f0f0; }
  
  /* Math Game */
  .math-problem { font-family: 'Comic Neue', cursive; font-size: 5rem; color: #333; font-weight: bold; margin-bottom: 20px; text-align: center; }
  .math-choices { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
  .m-choice { background: #fff; border: 4px solid #4cd137; border-radius: 15px; font-size: 3rem; padding: 20px 40px; cursor: pointer; font-family: 'Comic Neue', cursive; color: #333; box-shadow: 0 8px 0 #38a829; transition: transform 0.1s; min-width: 100px; text-align: center; }
  .m-choice:active { transform: translateY(8px); box-shadow: 0 0 0 #38a829; }
  
  #hint-btn { background: #f39c12; color: #fff; border: none; padding: 15px 30px; font-size: 1.5rem; border-radius: 12px; cursor: pointer; font-family: 'Comic Neue'; box-shadow: 0 6px 0 #e67e22; transition: 0.1s; margin-bottom: 20px; }
  #hint-btn:active { transform: translateY(6px); box-shadow: none; }
  
  .math-viz { display: none; align-items: center; justify-content: center; gap: 20px; min-height: 120px; margin-bottom: 20px; font-size: 3rem; font-family: 'Comic Neue', cursive; color: #555; }
  .apple-group { display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 15px; }
  .apple-num { font-size: 2rem; font-weight: bold; margin-bottom: 5px; color: #333; }
  .apple-icons { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; max-width: 250px; }
  .apple { transition: opacity 1s, transform 1s, filter 1s; font-size: 2.5rem; display: inline-block; }
  .apple.removed { opacity: 0; transform: translateY(-30px) scale(0.5); filter: grayscale(100%); }
  
  /* Matching Game */
  .match-grid { display: grid; gap: 15px; padding: 20px; max-width: 800px; margin: 0 auto; }
  .m-card { width: 90px; height: 110px; background: #9c88ff; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 3.5rem; cursor: pointer; box-shadow: 0 6px 0 #7158e2; color: transparent; transition: 0.3s; user-select: none; }
  @media (min-width: 600px) { .m-card { width: 110px; height: 130px; font-size: 4rem; } }
  .m-card.flipped { background: #fff; border: 3px solid #9c88ff; color: #333; box-shadow: 0 2px 0 #7158e2; transform: translateY(4px); }
  .m-card.matched { background: #2ecc71; border-color: #27ae60; color: #fff; box-shadow: 0 2px 0 #27ae60; transform: translateY(4px) scale(0.95); opacity: 0.8; }
  
  /* Typing Game */
  .type-container { display: flex; justify-content: center; gap: 5px; margin-bottom: 30px; flex-wrap: wrap; }
  .type-letter { font-size: 6rem; font-family: 'JetBrains Mono', monospace; font-weight: bold; color: #ddd; text-transform: uppercase; transition: transform 0.1s, color 0.2s; text-align: center; border-bottom: 4px solid #ccc; padding: 0 10px; min-width: 60px; }
  .type-letter.filled { color: #333; border-bottom-color: #2ecc71; }
  .type-letter.active-target { border-bottom-color: #3498db; transform: scale(1.1); color: #999; }
  .type-letter.error { color: #e74c3c; transform: translateX(5px); }
  .type-letter.pop { transform: scale(1.3) rotate(5deg); color: #2ecc71; border-bottom-color: transparent; }
  .type-prompt { font-family: 'Comic Neue', cursive; font-size: 2rem; color: #7f8c8d; margin-bottom: 20px; }
  .type-stats { font-family: 'Comic Neue', cursive; font-size: 1.5rem; color: #e67e22; margin-top: 20px; text-align: center; height: 40px; font-weight: bold; }

  /* Life Skills */
  .life-title { font-family: 'Comic Neue', cursive; font-size: 2.5rem; color: #2c3e50; margin-bottom: 20px; text-align: center; }
  .life-task-area { background: #fff; border: 4px solid #bdc3c7; border-radius: 20px; padding: 20px; width: 90%; max-width: 600px; height: 400px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); overflow: hidden; }
  
  /* Vacuuming Mini-Game */
  .dirt { position: absolute; font-size: 2rem; user-select: none; z-index: 1; transition: transform 0.2s, opacity 0.2s; }
  #vacuum { position: absolute; font-size: 4rem; z-index: 2; pointer-events: none; transform: translate(-50%, -50%); transition: transform 0.1s ease-out; }
  .dirt.cleaned { transform: scale(0); opacity: 0; }
  
  /* Washing Dishes Mini-Game */
  .dish { position: absolute; width: 120px; height: 120px; border-radius: 50%; background: #eee; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 4rem; user-select: none; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: inset 0 0 20px rgba(0,0,0,0.1); overflow: hidden; }
  .stain { position: absolute; font-size: 3rem; opacity: 0.8; }
  #sponge { position: absolute; font-size: 4rem; z-index: 10; pointer-events: none; transform: translate(-50%, -50%); transition: transform 0.05s linear; }
  
  /* Money Handling (Checkout) */
  .register-display { background: #2c3e50; color: #2ecc71; font-family: 'JetBrains Mono'; font-size: 2.5rem; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; text-align: right; box-shadow: inset 0 0 10px #000; }
  .money-tray { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
  .bill { background: #badc58; border: 2px solid #6ab04c; color: #222; font-family: 'JetBrains Mono'; padding: 15px 30px; border-radius: 5px; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 0 #6ab04c; transition: transform 0.1s; }
  .bill:active { transform: translateY(4px); box-shadow: none; }
  .coin { background: #f6e58d; border: 2px solid #f9ca24; color: #222; font-family: 'JetBrains Mono'; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 0 #f9ca24; transition: transform 0.1s; }
  .coin.silver { background: #dff9fb; border-color: #95afc0; box-shadow: 0 4px 0 #95afc0; }
  .coin:active { transform: translateY(4px); box-shadow: none; }
  
  .life-controls { margin-top: 20px; display: flex; gap: 10px; }

  /* Feedback Overlay */
  #feedback { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-family: 'Comic Neue', cursive; font-weight: bold; color: #f1c40f; text-shadow: 2px 2px 0 #333, -2px -2px 0 #333, 2px -2px 0 #333, -2px 2px 0 #333; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; z-index: 100; text-align: center; width: 100%; }
  #feedback.show { opacity: 1; transform: translate(-50%, -60%); }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" id="nav-back">⬅ HOME</button>
    <div style="color:#4db8ff;font-family:'JetBrains Mono';font-weight:bold;font-size:1.2rem;">AMNI-LEARN</div>
    <div class="top-controls">
        <span class="fs-hint" id="fs-hint">(Press ESC to exit)</span>
        <button class="fs-btn" id="fs-btn">⛶ FULLSCREEN</button>
    </div>
  </div>
  
  <div id="menu-view" class="view active">
    <h1 class="menu-title">CHOOSE A GAME</h1>
    
    <div class="game-grid" id="main-game-grid">
        <div class="cat-title">School Skills</div>
        <button class="game-btn tracing" data-game="tracing"><span class="btn-icon">✏️</span><span class="btn-text">Tracing & Art</span></button>
        <button class="game-btn math" data-game="math"><span class="btn-icon">➕</span><span class="btn-text">Math Basics</span></button>
        <button class="game-btn matching" data-game="matching"><span class="btn-icon">🧩</span><span class="btn-text">Matching</span></button>
        <button class="game-btn typing" data-game="typing"><span class="btn-icon">⌨️</span><span class="btn-text">Typing Fun</span></button>
        
        <div class="cat-title">Life Skills (Home-Ec)</div>
        <button class="game-btn life" data-game="life" data-subgame="vacuum"><span class="btn-icon">🧹</span><span class="btn-text">Vacuuming</span></button>
        <button class="game-btn life" data-game="life" data-subgame="dishes"><span class="btn-icon">🧽</span><span class="btn-text">Wash Dishes</span></button>
        <button class="game-btn life" data-game="life" data-subgame="money"><span class="btn-icon">🕰️</span><span class="btn-text">Read Clock</span></button>

        <div class="cat-title">General Knowledge</div>
        <button class="game-btn quiz" data-game="quiz" data-subject="animals"><span class="btn-icon">🦁</span><span class="btn-text">Animals & Objects</span></button>
        <button class="game-btn quiz" data-game="quiz" data-subject="music"><span class="btn-icon">🎵</span><span class="btn-text">Music & Instruments</span></button>
        <button class="game-btn quiz" data-game="quiz" data-subject="languages"><span class="btn-icon">🗣️</span><span class="btn-text">Reading & Languages</span></button>

        <div class="cat-title" id="stem-title" style="display:none;">Higher Education (STEM)</div>
        <button class="game-btn quiz" id="btn-math" data-game="quiz" data-subject="math" style="display:none;"><span class="btn-icon">📐</span><span class="btn-text">Advanced Math</span></button>
        <button class="game-btn quiz" id="btn-engineering" data-game="quiz" data-subject="engineering" style="display:none;"><span class="btn-icon">⚙️</span><span class="btn-text">Physics & Engineering</span></button>
    </div>
  </div>
  
  <div id="quiz-view" class="view">
      <div class="life-title" id="quiz-title">Quiz Time</div>
      <div class="life-task-area" id="quiz-task-area" style="display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
          <div id="quiz-prompt" style="font-size:4rem; margin-bottom:30px; font-family:'Comic Neue',cursive;">Prompt</div>
          <div id="quiz-choices" style="display:flex; gap:15px; flex-wrap:wrap; justify-content:center; width:100%;"></div>
      </div>
  </div>
  
  <div id="tracing-view" class="view">
    <button id="creative-mode-toggle">Switch to Free Draw 🎨</button>
    <div class="draw-tools" id="draw-tools">
      <div class="tool-group">
        <button class="brush-btn active" data-brush="pen">✏️ Pen</button>
        <button class="brush-btn" data-brush="marker">🖍️ Marker</button>
        <button class="brush-btn" data-brush="chalk">🪨 Chalk</button>
        <button class="brush-btn" data-brush="eraser">🧼 Eraser</button>
      </div>
      <div class="tool-group">
        <div class="color-btn active" style="background:#e74c3c" data-color="#e74c3c"></div>
        <div class="color-btn" style="background:#3498db" data-color="#3498db"></div>
        <div class="color-btn" style="background:#2ecc71" data-color="#2ecc71"></div>
        <div class="color-btn" style="background:#f1c40f" data-color="#f1c40f"></div>
        <div class="color-btn" style="background:#9b59b6" data-color="#9b59b6"></div>
        <div class="color-btn" style="background:#333333" data-color="#333333"></div>
      </div>
      <button class="t-btn t-clear" id="d-clear" style="margin-left:10px;">Clear All</button>
    </div>
    <canvas id="trace-canvas"></canvas>
    <div class="tracing-controls">
      <button class="t-btn t-clear" id="t-clear">Restart</button>
      <button class="t-btn t-next" id="t-next">Check / Next ➡️</button>
    </div>
  </div>
  
  <div id="math-view" class="view">
    <div class="math-problem" id="math-problem">1 + 1 = ?</div>
    <button id="hint-btn">Show Hint 💡</button>
    <div class="math-viz" id="math-viz"></div>
    <div class="math-choices" id="math-choices"></div>
  </div>
  
  <div id="matching-view" class="view">
    <div class="match-grid" id="match-grid"></div>
  </div>

  <div id="typing-view" class="view">
    <div class="type-prompt" id="type-prompt">Type the letters on your keyboard!</div>
    <div class="type-container" id="type-container"></div>
    <div class="type-stats" id="type-stats"></div>
  </div>
  
  <div id="life-view" class="view">
      <div class="life-title" id="life-title">Life Skills</div>
      <div class="life-task-area" id="life-task-area">
          <!-- Dynamic Content based on subgame -->
      </div>
      <div class="life-controls" id="life-controls">
          <!-- Additional controls if needed -->
      </div>
  </div>

  <div id="feedback">Great Job!</div>
