<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" id="nav-back">⬅ HOME</button>
    <div style="color:#4db8ff;font-family:'JetBrains Mono';font-weight:bold;font-size:1.2rem;">AMNI-LEARN</div>
    <div class="score-bar">
        <span>⭐ <span class="score-val" id="score-val">0</span></span>
        <span class="streak-fire" id="streak-fire">🔥 <span class="streak-val" id="streak-val">0</span></span>
    </div>
    <div class="top-controls">
